<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy 40th Birthday Jack!</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: 'Lato', sans-serif;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      background: url('website_photo.jpg') center 30% / cover no-repeat;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.15) 0%,
        rgba(0, 0, 0, 0.05) 40%,
        rgba(0, 0, 0, 0.6) 100%
      );
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      padding-bottom: 8vh;
      text-align: center;
    }

    .message {
      color: #fff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    }

    .message .subtitle {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: clamp(0.9rem, 2.5vw, 1.4rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      opacity: 0.85;
    }

    .message h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(3rem, 10vw, 8rem);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .message h1 .forty {
      color: #f9d342;
    }

    .message .name {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(2rem, 6vw, 5rem);
      letter-spacing: 0.05em;
      margin-top: 0.2em;
    }

    .confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 10;
    }

    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 14px;
      opacity: 0;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="overlay">
      <div class="message">
        <div class="subtitle">Celebrating</div>
        <h1>Happy <span class="forty">40th</span></h1>
        <div class="name">Jack Mayo</div>
      </div>
    </div>
  </div>

  <div class="confetti" id="confetti"></div>

  <script>
    const colours = ['#f9d342','#ff6b6b','#4ecdc4','#a8e6cf','#ffeaa7','#dfe6e9','#fd79a8','#6c5ce7'];
    const container = document.getElementById('confetti');
    for (let i = 0; i < 60; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colours[Math.floor(Math.random() * colours.length)];
      el.style.width = (Math.random() * 8 + 6) + 'px';
      el.style.height = (Math.random() * 10 + 8) + 'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.animationDuration = (Math.random() * 4 + 4) + 's';
      el.style.animationDelay = (Math.random() * 6) + 's';
      container.appendChild(el);
    }
  </script>

</body>
</html>
